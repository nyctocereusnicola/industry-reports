name: 夸克网盘同步报告

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scan_quark.py"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install httpx

      - name: 扫描夸克网盘并生成分类JSON
        env:
          QUARK_COOKIE: ${{ secrets.QUARK_COOKIE }}
          QUARK_ROOT_FID: ${{ secrets.QUARK_ROOT_FID }}
        run: python scan_quark.py

      - name: 提交更新到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --staged --quiet || git commit -m "sync(quark): $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
