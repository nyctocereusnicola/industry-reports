name: 飞书同步报告

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "触发原因（可选）"
        required: false
        default: "手动同步"
  push:
    branches:
      - main
    paths:
      - scan_v2.py
      - .github/workflows/sync.yml

# 权限：允许写入仓库内容
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install httpx

      - name: 扫描飞书 → 分类JSON
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_FOLDER_TOKEN: ${{ secrets.FEISHU_FOLDER_TOKEN }}
        run: python scan_v2.py

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --staged --quiet || git commit -m "🔄 自动同步飞书报告 — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
