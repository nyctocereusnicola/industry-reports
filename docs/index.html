<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行业报告 — 飞书同步</title>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --primary:#2563eb;--primary-light:#3b82f6;--primary-bg:#eff6ff;
            --bg:#f8fafc;--card:#fff;--text:#1e293b;--text2:#64748b;
            --border:#e2e8f0;--radius:10px;--sidebar-w:230px;
        }
        body{
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
            background:var(--bg);color:var(--text);line-height:1.6;
            display:flex;min-height:100vh;
        }

        /* ===== 左侧栏 ===== */
        .sidebar{
            width:var(--sidebar-w);min-width:var(--sidebar-w);
            background:#fff;border-right:1px solid var(--border);
            position:fixed;top:0;bottom:0;left:0;z-index:200;
            display:flex;flex-direction:column;overflow-y:auto;
        }
        .sidebar-logo{
            padding:20px 20px 12px;border-bottom:1px solid var(--border);
            font-size:18px;font-weight:800;color:var(--primary);
        }
        .sidebar-logo span{font-size:12px;color:var(--text2);font-weight:400;margin-left:6px}
        .sidebar-stats{
            padding:12px 20px;border-bottom:1px solid var(--border);
            font-size:13px;color:var(--text2);
        }
        .sidebar-stats strong{color:var(--text);font-size:16px}
        .sidebar-nav{padding:8px 0;flex:1}
        .sidebar-nav .nav-section{
            padding:8px 20px 4px;font-size:11px;font-weight:600;
            color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;
        }
        .sidebar-nav a{
            display:flex;align-items:center;gap:10px;
            padding:9px 20px;font-size:14px;color:var(--text);
            text-decoration:none;transition:all .15s;border-left:3px solid transparent;
            cursor:pointer;
        }
        .sidebar-nav a:hover{background:var(--primary-bg);color:var(--primary)}
        .sidebar-nav a.active{
            background:var(--primary-bg);color:var(--primary);
            border-left-color:var(--primary);font-weight:600;
        }
        .sidebar-nav a .count{
            margin-left:auto;font-size:11px;color:var(--text2);
            background:#f1f5f9;padding:1px 7px;border-radius:10px;
        }
        .sidebar-nav a .count.loading-count{color:transparent;background:#e2e8f0;animation:pulse 1.5s infinite}
        @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
        .sidebar-footer{
            padding:14px 20px;border-top:1px solid var(--border);
            font-size:11px;color:var(--text2);
        }

        /* ===== 右侧主区 ===== */
        .main{
            margin-left:var(--sidebar-w);flex:1;min-width:0;
            display:flex;flex-direction:column;
        }
        .main-header{
            background:#fff;border-bottom:1px solid var(--border);
            padding:14px 28px;position:sticky;top:0;z-index:100;
            display:flex;align-items:center;gap:16px;flex-wrap:wrap;
        }
        .main-header h2{font-size:20px;font-weight:700;white-space:nowrap}
        .main-header .breadcrumb{font-size:13px;color:var(--text2)}
        .search-box{flex:1;min-width:200px;position:relative}
        .search-box input{
            width:100%;padding:8px 14px 8px 36px;border:1.5px solid var(--border);
            border-radius:8px;font-size:14px;outline:none;transition:.2s;
            background:#f8fafc;
        }
        .search-box input:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.08)}
        .search-box .s-icon{
            position:absolute;left:12px;top:50%;transform:translateY(-50%);
            font-size:15px;color:var(--text2);pointer-events:none;
        }

        /* ===== 卡片区 ===== */
        .content{padding:0 28px 32px;flex:1}
        .list-header{
            padding:18px 0 12px;font-size:13px;color:var(--text2);
            display:flex;justify-content:space-between;align-items:center;
        }
        .report-grid{
            display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;
        }
        .card{
            background:var(--card);border-radius:var(--radius);
            border:1px solid var(--border);padding:18px;
            transition:all .2s;display:flex;flex-direction:column;
            position:relative;
        }
        .card:hover{border-color:#cbd5e1;box-shadow:0 4px 16px rgba(0,0,0,.06);transform:translateY(-1px)}
        .card-badge{
            position:absolute;top:0;right:0;
            font-size:10px;font-weight:600;padding:3px 10px;
            border-radius:0 0 0 8px;text-transform:uppercase;
        }
        .badge-doc{background:#eff6ff;color:#2563eb}
        .badge-sheet{background:#f0fdf4;color:#16a34a}
        .badge-slides{background:#fef2f2;color:#dc2626}
        .badge-bitable{background:#fefce8;color:#ca8a04}
        .badge-mindnote{background:#f5f3ff;color:#7c3aed}
        .badge-file{background:#f8fafc;color:#64748b}
        .badge-folder{background:#fff7ed;color:#ea580c}
        .card-title{
            font-size:15px;font-weight:600;line-height:1.45;margin-bottom:6px;
            display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
            overflow:hidden;word-break:break-word;
        }
        .card-meta{
            font-size:12px;color:var(--text2);margin-top:auto;padding-top:12px;
            border-top:1px solid #f1f5f9;
            display:flex;justify-content:space-between;align-items:center;
        }
        .card-link{
            display:inline-flex;align-items:center;gap:4px;
            margin-top:10px;padding:7px 12px;background:var(--primary-bg);
            color:var(--primary);border-radius:6px;font-size:13px;font-weight:500;
            text-decoration:none;transition:.15s;align-self:flex-start;
        }
        .card-link:hover{background:#dbeafe}

        /* ===== 分页 ===== */
        .pagination{
            display:flex;justify-content:center;align-items:center;gap:6px;
            margin-top:28px;padding-bottom:20px;
        }
        .pagination button{
            padding:7px 13px;border-radius:7px;border:1px solid var(--border);
            background:#fff;font-size:13px;cursor:pointer;transition:.15s;
        }
        .pagination button:hover:not(:disabled){border-color:var(--primary);color:var(--primary)}
        .pagination button.active{background:var(--primary);color:#fff;border-color:var(--primary)}
        .pagination button:disabled{opacity:.35;cursor:default}
        .pagination .info{font-size:13px;color:var(--text2);margin:0 8px}

        /* ===== 状态 ===== */
        .loading-state{text-align:center;padding:80px 20px;color:var(--text2)}
        .loading-state .spinner{
            width:36px;height:36px;border:3px solid var(--border);
            border-top-color:var(--primary);border-radius:50%;
            animation:spin .8s linear infinite;margin:0 auto 16px;
        }
        @keyframes spin{to{transform:rotate(360deg)}}
        .empty-state{text-align:center;padding:80px 20px}
        .empty-state h3{font-size:18px;color:var(--text);margin-bottom:6px}
        .empty-state p{color:var(--text2);font-size:14px}

        /* ===== 响应式 ===== */
        @media(max-width:768px){
            .sidebar{display:none}
            .main{margin-left:0}
            .content{padding:0 12px 24px}
            .main-header{padding:10px 12px}
            .main-header h2{font-size:17px}
            .report-grid{grid-template-columns:1fr;gap:10px}
        }
    </style>
</head>
<body>

<!-- ========== 左侧栏 ========== -->
<aside class="sidebar">
    <div class="sidebar-logo">📊 行业报告<span>飞书同步</span></div>
    <div class="sidebar-stats">
        共 <strong id="sidebarTotal">-</strong> 篇报告
        <div style="font-size:11px;color:#94a3b8" id="sidebarSync">加载中...</div>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section">全部</div>
        <a data-cat="" class="active" onclick="setCategory('')">
            📋 全部报告 <span class="count loading-count" id="countAll">-</span>
        </a>
        <div class="nav-section" style="margin-top:8px">行业分类</div>
    </nav>
    <div class="sidebar-footer">
        数据来源：飞书 · 托管于 GitHub Pages
    </div>
</aside>

<!-- ========== 右侧主区 ========== -->
<div class="main">
    <div class="main-header">
        <h2 id="pageTitle">全部报告</h2>
        <span class="breadcrumb" id="breadcrumb"></span>
        <div class="search-box">
            <span class="s-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="搜索报告标题...">
        </div>
    </div>

    <div class="content">
        <div class="list-header">
            <span id="resultInfo">正在加载...</span>
        </div>
        <div id="reportGrid" class="report-grid"></div>
        <div id="pagination" class="pagination"></div>
        <div id="loadingState" class="loading-state">
            <div class="spinner"></div>
            <div>正在加载报告数据...</div>
        </div>
        <div id="emptyState" class="empty-state" style="display:none">
            <h3>📭 暂无匹配的报告</h3>
            <p>试试调整搜索条件</p>
        </div>
    </div>
</div>

<script>
// ==================== 配置 ====================
const PAGE_SIZE = 20;
const ALL_CATEGORIES = [
    "潮流时尚","宠物","抖音","小红书","美妆",
    "海外市场","户外与运动","家居","健康养生","快消品",
    "母婴","其他","奢侈品","食品饮料","香相关"
];

// ==================== 状态 ====================
let allReports = [];       // 全部报告
let catIndex = null;       // _index.json
let currentCat = "";       // 当前分类
let currentPage = 1;
let currentSearch = "";

// ==================== 渲染导航 ====================
function renderNav() {
    const nav = document.querySelector(".sidebar-nav");
    // 清除旧分类导航（保留前两个）
    const existing = nav.querySelectorAll(".cat-link");
    existing.forEach(e => e.remove());

    let totalAll = 0;
    ALL_CATEGORIES.forEach(cat => {
        const count = catIndex ? (catIndex.categories.find(cc => cc.name === cat)?.count || 0) : 0;
        totalAll += count;
        const a = document.createElement("a");
        a.className = "cat-link";
        a.setAttribute("data-cat", cat);
        a.onclick = function() { setCategory(cat); };
        a.innerHTML = `📂 ${cat} <span class="count" id="count_${cat.replace(/\s/g,'_')}">${count || '-'}</span>`;
        nav.appendChild(a);
    });

    // 更新全部计数
    document.getElementById("countAll").textContent = totalAll || (allReports.length || '-');
    document.getElementById("countAll").classList.remove("loading-count");
    document.getElementById("sidebarTotal").textContent = totalAll || (allReports.length || '-');

    ALL_CATEGORIES.forEach(cat => {
        const el = document.getElementById("count_" + cat.replace(/\s/g, '_'));
        if (el) el.classList.remove("loading-count");
    });
}

// ==================== 数据加载 ====================
async function loadIndex() {
    try {
        const resp = await fetch("data/categories/_index.json");
        if (resp.ok) {
            catIndex = await resp.json();
            document.getElementById("sidebarSync").textContent =
                "最近同步: " + (catIndex.last_sync || "未知");
        }
    } catch(e) {
        console.log("索引文件未就绪:", e.message);
    }
}

async function loadCategory(cat) {
    const loading = document.getElementById("loadingState");
    const grid = document.getElementById("reportGrid");
    loading.style.display = "block";
    grid.innerHTML = "";

    let reports = [];
    let sourceLabel = "";

    if (!cat) {
        // 全部：汇总加载所有分类
        sourceLabel = "全部";
        for (const c of ALL_CATEGORIES) {
            const safe = c.replace(/\//g,"_").replace(/\s/g,"_");
            try {
                const resp = await fetch(`data/categories/${safe}.json`);
                if (resp.ok) {
                    const data = await resp.json();
                    if (data.reports) reports = reports.concat(data.reports);
                }
            } catch(e) {}
        }
    } else {
        sourceLabel = cat;
        const safe = cat.replace(/\//g,"_").replace(/\s/g,"_");
        try {
            const resp = await fetch(`data/categories/${safe}.json`);
            if (resp.ok) {
                const data = await resp.json();
                reports = data.reports || [];
            }
        } catch(e) {
            console.error("加载失败:", e);
        }
    }

    allReports = reports;
    loading.style.display = "none";

    // 更新计数
    document.getElementById("countAll").textContent = allReports.length;
    document.getElementById("sidebarTotal").textContent = allReports.length;
    const countEl = document.getElementById("count_" + (cat || "All").replace(/\s/g,'_'));
    if (countEl) countEl.textContent = allReports.length;

    renderGrid();
}

// ==================== 过滤与分页 ====================
function getFiltered() {
    let result = [...allReports];
    if (currentSearch) {
        const q = currentSearch.toLowerCase();
        result = result.filter(r =>
            (r.title||"").toLowerCase().includes(q) ||
            (r.summary||"").toLowerCase().includes(q)
        );
    }
    return result;
}

function getPageData() {
    const filtered = getFiltered();
    const total = filtered.length;
    const totalPages = Math.ceil(total / PAGE_SIZE) || 1;
    const start = (currentPage - 1) * PAGE_SIZE;
    const paged = filtered.slice(start, start + PAGE_SIZE);
    return { paged, total, totalPages };
}

// ==================== 渲染 ====================
function esc(s) {
    if (!s) return "";
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
}

function typeIcon(t) {
    const m = {doc:"📝",docx:"📝",sheet:"📊",bitable:"🗂️",slides:"🎞️",mindnote:"🧠",folder:"📁"};
    return m[t] || "📎";
}

function typeBadge(t) {
    const m = {docx:"badge-doc",doc:"badge-doc",sheet:"badge-sheet",
               slides:"badge-slides",bitable:"badge-bitable",
               mindnote:"badge-mindnote",folder:"badge-folder"};
    return m[t] || "badge-file";
}

function fmtTime(ts) {
    if (!ts) return "";
    try {
        const d = new Date(ts);
        if (isNaN(d.getTime())) return ts.slice(0,10);
        return d.toLocaleDateString("zh-CN",{month:"short",day:"numeric",year:"numeric"});
    } catch(e) { return ts; }
}

function renderCard(r) {
    const url = r.feishu_url || "#";
    return `
    <div class="card">
        <span class="card-badge ${typeBadge(r.file_type)}">${esc(r.file_ext||"文件")}</span>
        <div class="card-title" title="${esc(r.title)}">
            ${typeIcon(r.file_type)} ${esc(r.title)}
        </div>
        <a class="card-link" href="${url}" target="_blank" rel="noopener">🔗 飞书查看 →</a>
        <div class="card-meta">
            <span>🕐 ${fmtTime(r.feishu_modified)}</span>
            <span>👁 ${r.view_count||0}</span>
        </div>
    </div>`;
}

function renderGrid() {
    const { paged, total, totalPages } = getPageData();
    const grid = document.getElementById("reportGrid");
    const pag = document.getElementById("pagination");
    const empty = document.getElementById("emptyState");
    const info = document.getElementById("resultInfo");

    if (paged.length === 0) {
        grid.innerHTML = "";
        empty.style.display = "block";
        pag.innerHTML = "";
        info.textContent = "暂无数据";
    } else {
        empty.style.display = "none";
        info.textContent = `共 ${total} 篇报告`;
        grid.innerHTML = paged.map(renderCard).join("");

        // 分页
        if (totalPages <= 1) {
            pag.innerHTML = "";
        } else {
            let html = `<button onclick="go(${currentPage-1})" ${currentPage<=1?"disabled":""}>‹ 上一页</button>`;
            const s = Math.max(1, currentPage-2);
            const e = Math.min(totalPages, currentPage+2);
            for (let i=s; i<=e; i++) {
                html += `<button class="${i===currentPage?'active':''}" onclick="go(${i})">${i}</button>`;
            }
            html += `<button onclick="go(${currentPage+1})" ${currentPage>=totalPages?"disabled":""}>下一页 ›</button>`;
            html += `<span class="info">${currentPage}/${totalPages} 页</span>`;
            pag.innerHTML = html;
        }
    }
}

// ==================== 事件 ====================
function setCategory(cat) {
    currentCat = cat;
    currentPage = 1;
    currentSearch = "";

    // 更新导航选中状态
    document.querySelectorAll(".sidebar-nav a").forEach(a => {
        a.classList.toggle("active", a.getAttribute("data-cat") === cat);
    });

    document.getElementById("searchInput").value = "";

    if (cat) {
        document.getElementById("pageTitle").textContent = cat;
        document.getElementById("breadcrumb").textContent = "行业报告 / " + cat;
    } else {
        document.getElementById("pageTitle").textContent = "全部报告";
        document.getElementById("breadcrumb").textContent = "";
    }

    loadCategory(cat);
}

function go(p) {
    const { totalPages } = getPageData();
    if (p<1 || p>totalPages) return;
    currentPage = p;
    renderGrid();
    window.scrollTo({top: 100, behavior: "smooth"});
}

// ==================== 初始化 ====================
document.addEventListener("DOMContentLoaded", async () => {
    // 渲染空分类导航
    const nav = document.querySelector(".sidebar-nav");
    ALL_CATEGORIES.forEach(cat => {
        const a = document.createElement("a");
        a.className = "cat-link";
        a.setAttribute("data-cat", cat);
        a.onclick = function() { setCategory(cat); };
        a.innerHTML = `📂 ${cat} <span class="count loading-count" id="count_${cat.replace(/\s/g,'_')}">-</span>`;
        nav.appendChild(a);
    });

    // 加载索引
    await loadIndex();
    renderNav();

    // 搜索防抖
    let timer;
    document.getElementById("searchInput").addEventListener("input", function() {
        clearTimeout(timer);
        timer = setTimeout(() => {
            currentSearch = this.value.trim();
            currentPage = 1;
            renderGrid();
        }, 300);
    });

    // 默认加载全部
    loadCategory("");
});
</script>
</body>
</html>
