<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行业报告仪表盘（夸克网盘） — Industry Reports</title>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --primary:#4f46e5;--primary2:#6366f1;--primary3:#e0e7ff;
            --bg:#f1f5f9;--card:#fff;--text:#0f172a;--text2:#64748b;
            --border:#e2e8f0;--r:12px;--sw:240px;
            --s0:#4f46e5;--s1:#06b6d4;--s2:#10b981;--s3:#f59e0b;--s4:#ef4444;--s5:#8b5cf6;
        }
        body{
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
            background:var(--bg);color:var(--text);line-height:1.5;display:flex;min-height:100vh;
        }
        a{text-decoration:none;color:inherit}

        /* ===== 侧栏 ===== */
        .sidebar{
            width:var(--sw);min-width:var(--sw);
            background:#fff;border-right:1px solid var(--border);
            position:fixed;top:0;bottom:0;left:0;z-index:100;
            display:flex;flex-direction:column;overflow-y:auto;
        }
        .sb-logo{
            padding:20px 20px 14px;border-bottom:1px solid var(--border);
            font-size:17px;font-weight:800;color:var(--primary);
            letter-spacing:-.3px;
        }
        .sb-logo span{font-size:11px;color:var(--text2);font-weight:400;margin-left:6px}
        .sb-sync{
            display:flex;align-items:center;gap:8px;
            padding:8px 20px;font-size:11px;color:var(--text2);
            background:#f0fdf4;border-bottom:1px solid #dcfce7;
        }
        .sb-sync.outdated{background:#fffbeb;border-bottom-color:#fde68a}
        .sb-stats{
            padding:14px 20px;border-bottom:1px solid var(--border);
            display:flex;gap:12px;flex-wrap:wrap;
        }
        .sb-stat{
            flex:1;min-width:60px;text-align:center;
            font-size:11px;color:var(--text2);
        }
        .sb-stat strong{display:block;font-size:18px;color:var(--text);font-weight:700}
        .sb-nav{padding:6px 0;flex:1}
        .sb-nav .nav-hd{
            padding:10px 20px 4px;font-size:10px;font-weight:700;
            color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;
        }
        .sb-nav a{
            display:flex;align-items:center;gap:8px;
            padding:8px 18px;font-size:13px;color:var(--text);
            cursor:pointer;transition:all .15s;border-left:3px solid transparent;
        }
        .sb-nav a:hover{background:var(--primary3)}
        .sb-nav a.active{
            background:var(--primary3);color:var(--primary);
            border-left-color:var(--primary);font-weight:600;
        }
        .sb-nav a .cnt{
            margin-left:auto;font-size:10px;color:var(--text2);
            background:#f1f5f9;padding:1px 8px;border-radius:10px;min-width:28px;text-align:center;
        }
        .sb-nav a.active .cnt{background:var(--primary3);color:var(--primary)}
        .sb-nav a .cnt.zero{opacity:.35}
        .sb-foot{
            padding:12px 20px;border-top:1px solid var(--border);
            font-size:10px;color:var(--text2);
        }

        /* ===== 主区 ===== */
        .main{margin-left:var(--sw);flex:1;min-width:0;display:flex;flex-direction:column}
        
        /* 顶部栏 */
        .topbar{
            background:#fff;border-bottom:1px solid var(--border);
            padding:12px 24px;position:sticky;top:0;z-index:50;
            display:flex;align-items:center;gap:16px;flex-wrap:wrap;
        }
        .topbar h2{font-size:19px;font-weight:700;white-space:nowrap}
        .topbar .crumb{font-size:12px;color:var(--text2)}
        .search-wrap{flex:1;min-width:220px;position:relative}
        .search-wrap .sicon{
            position:absolute;left:12px;top:50%;transform:translateY(-50%);
            font-size:14px;color:var(--text2);pointer-events:none;
        }
        .search-wrap input{
            width:100%;padding:9px 14px 9px 36px;border:1.5px solid var(--border);
            border-radius:8px;font-size:13px;outline:none;transition:.2s;
            background:#f8fafc;
        }
        .search-wrap input:focus{border-color:var(--primary2);background:#fff;box-shadow:0 0 0 3px rgba(99,102,241,.08)}
        .search-wrap .clear-btn{
            position:absolute;right:8px;top:50%;transform:translateY(-50%);
            background:none;border:none;font-size:16px;color:var(--text2);
            cursor:pointer;padding:2px 6px;border-radius:4px;display:none;
        }
        .search-wrap .clear-btn:hover{background:#f1f5f9}
        .search-wrap .clear-btn.visible{display:block}

        /* 去重开关 */
        .dedup-toggle{
            display:flex;align-items:center;gap:6px;cursor:pointer;
            font-size:12px;color:var(--text2);white-space:nowrap;
            padding:6px 12px;border-radius:7px;transition:.15s;
            background:#f8fafc;border:1px solid var(--border);
            user-select:none;
        }
        .dedup-toggle:hover{background:var(--primary3);border-color:var(--primary2)}
        .dedup-toggle input{width:14px;height:14px;accent-color:var(--primary);cursor:pointer}
        .dedup-toggle .dt-label{font-weight:500}

        /* 刷新按钮 */
        .refresh-btn{
            display:inline-flex;align-items:center;gap:6px;
            padding:8px 16px;border-radius:7px;border:1px solid var(--primary);
            background:var(--primary);color:#fff;font-size:12px;font-weight:600;
            cursor:pointer;transition:.15s;white-space:nowrap;
            font-family:inherit;
        }
        .refresh-btn:hover{background:var(--primary2);border-color:var(--primary2)}
        .refresh-btn:active{transform:scale(.97)}
        .refresh-btn.loading{opacity:.7;pointer-events:none}
        .refresh-btn .rf-icon{font-size:15px;transition:transform .3s}
        .refresh-btn.loading .rf-icon{animation:spin .7s linear infinite}

        /* 同步状态 */
        .sync-status{
            display:flex;align-items:center;gap:6px;
            font-size:11px;color:var(--text2);white-space:nowrap;
        }
        .sync-status .ss-dot{
            width:7px;height:7px;border-radius:50%;
        }
        .ss-dot.ok{background:#10b981;box-shadow:0 0 4px rgba(16,185,129,.4)}
        .ss-dot.old{background:#f59e0b;box-shadow:0 0 4px rgba(245,158,11,.4)}
        .ss-dot.err{background:#ef4444;box-shadow:0 0 4px rgba(239,68,68,.4)}

        /* 重复标记 */
        .card.dup-card{border-left:3px solid #f59e0b;opacity:.85}
        .card.dup-card .c-dup-tag{
            position:absolute;top:6px;left:6px;
            font-size:9px;font-weight:600;padding:2px 7px;
            border-radius:3px;background:#fef3c7;color:#b45309;
        }

        /* 统计面板 */
        .stats-panel{
            background:var(--card);margin:20px 24px 0;border-radius:var(--r);
            border:1px solid var(--border);padding:20px 24px;
            display:grid;grid-template-columns:200px 1fr 1fr;gap:24px;
            align-items:start;
        }
        .stats-kpi{display:flex;flex-direction:column;gap:8px}
        .stats-kpi .kpi-num{font-size:42px;font-weight:800;color:var(--primary);line-height:1}
        .stats-kpi .kpi-label{font-size:13px;color:var(--text2)}
        .stats-kpi .kpi-sub{font-size:11px;color:var(--text2)}
        .stats-chart h4,.stats-dist h4{
            font-size:12px;font-weight:600;color:var(--text2);
            margin-bottom:10px;text-transform:uppercase;letter-spacing:.3px;
        }
        .bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
        .bar-row .bar-label{font-size:11px;width:64px;text-align:right;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .bar-row .bar-track{flex:1;height:8px;background:#f1f5f9;border-radius:4px;overflow:hidden}
        .bar-row .bar-fill{height:100%;border-radius:4px;background:var(--primary);transition:width .5s ease}
        .bar-row .bar-val{font-size:10px;color:var(--text2);width:36px;text-align:right}
        .trend-bars{display:flex;align-items:flex-end;gap:6px;height:80px;padding-top:4px}
        .trend-bar-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
        .trend-bar-item .tb-bar{width:100%;max-width:32px;background:var(--primary);border-radius:3px 3px 0 0;transition:height .5s ease;min-height:2px}
        .trend-bar-item .tb-label{font-size:9px;color:var(--text2)}
        .trend-bar-item .tb-val{font-size:10px;font-weight:600;color:var(--text)}

        /* 内容区 */
        .content{padding:20px 24px 40px}
        .list-info{
            display:flex;justify-content:space-between;align-items:center;
            padding:0 0 14px;font-size:13px;color:var(--text2);
        }
        .list-info .sort-select{
            padding:5px 10px;border:1px solid var(--border);border-radius:6px;
            font-size:12px;background:#fff;outline:none;cursor:pointer;
        }
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
        .card{
            background:var(--card);border-radius:var(--r);border:1px solid var(--border);
            padding:18px;transition:all .2s;display:flex;flex-direction:column;
            position:relative;overflow:hidden;
        }
        .card:hover{border-color:#cbd5e1;box-shadow:0 4px 20px rgba(0,0,0,.06);transform:translateY(-1px)}
        .card .c-score{
            position:absolute;top:0;right:0;
            font-size:10px;font-weight:700;padding:4px 10px;
            border-radius:0 0 0 var(--r);color:#fff;
        }
        .c-score.s90{background:var(--s1)}
        .c-score.s80{background:var(--s2)}
        .c-score.s70{background:var(--s3)}
        .c-score.s60{background:var(--s5)}
        .c-score.s50{background:var(--text2)}
        .card .c-title{
            font-size:14px;font-weight:600;line-height:1.5;margin-bottom:8px;
            display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
            overflow:hidden;word-break:break-word;padding-right:40px;
        }
        .card .c-summary{
            font-size:12px;color:var(--text2);line-height:1.55;
            display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
            overflow:hidden;margin-bottom:10px;flex:1;
        }
        .card .c-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
        .card .c-tags span{
            font-size:10px;padding:2px 8px;border-radius:4px;
            background:#f1f5f9;color:var(--text2);
        }
        .card .c-tags span.tag-cat{
            background:var(--primary3);color:var(--primary);font-weight:600;
        }
        .card .c-footer{
            display:flex;justify-content:space-between;align-items:center;
            padding-top:10px;border-top:1px solid #f1f5f9;
        }
        .card .c-date{font-size:11px;color:var(--text2)}
        .card .c-link{
            display:inline-flex;align-items:center;gap:4px;
            padding:6px 12px;background:var(--primary3);color:var(--primary);
            border-radius:6px;font-size:12px;font-weight:500;
            transition:.15s;
        }
        .card .c-link:hover{background:#c7d2fe}

        /* 分页 */
        .pagination{
            display:flex;justify-content:center;align-items:center;gap:5px;
            margin-top:28px;padding-bottom:20px;
        }
        .pagination button{
            padding:7px 14px;border-radius:7px;border:1px solid var(--border);
            background:#fff;font-size:12px;cursor:pointer;transition:.15s;
        }
        .pagination button:hover:not(:disabled){border-color:var(--primary);color:var(--primary)}
        .pagination button.active{background:var(--primary);color:#fff;border-color:var(--primary)}
        .pagination button:disabled{opacity:.3;cursor:default}
        .pagination .pg-info{font-size:12px;color:var(--text2);margin:0 6px}

        /* 状态 */
        .loading-box{text-align:center;padding:80px 20px;color:var(--text2)}
        .spinner{
            width:32px;height:32px;border:3px solid var(--border);
            border-top-color:var(--primary);border-radius:50%;
            animation:spin .7s linear infinite;margin:0 auto 14px;
        }
        @keyframes spin{to{transform:rotate(360deg)}}
        .empty-box{text-align:center;padding:80px 20px;display:none}
        .empty-box .e-icon{font-size:48px;margin-bottom:12px}
        .empty-box h3{font-size:17px;color:var(--text);margin-bottom:4px}
        .empty-box p{font-size:13px;color:var(--text2)}

        /* 导航链接 */
        .nav-link-row{
            text-align:center;padding:6px 0 2px;margin-top:auto;
            border-top:1px solid var(--border);
        }
        .nav-link-row a{
            font-size:10px;color:var(--text2);padding:6px 12px;
            display:inline-block;transition:.15s;
        }
        .nav-link-row a:hover{color:var(--primary)}

        @media(max-width:768px){
            .sidebar{display:none}
            .main{margin-left:0}
            .stats-panel{grid-template-columns:1fr;gap:16px}
            .grid{grid-template-columns:1fr}
            .content{padding:12px}
        }
    </style>
</head>
<body>

<!-- ==================== 侧栏 ==================== -->
<aside class="sidebar">
    <div class="sb-logo">📊 行业报告<span>夸克网盘</span></div>
    <div class="sb-sync" id="sbSync">
        <span class="ss-dot ok"></span>
        <span id="sbSyncText">数据就绪</span>
    </div>
    <div class="sb-stats">
        <div class="sb-stat"><strong id="sTotal">-</strong>总报告</div>
        <div class="sb-stat"><strong id="sCats">18</strong>行业</div>
        <div class="sb-stat"><strong id="sDups">-</strong>已去重</div>
    </div>
    <nav class="sb-nav">
        <div class="nav-hd">导航</div>
        <a data-cat="" class="active" onclick="setCat('')">
            📋 全部报告 <span class="cnt" id="cAll">-</span>
        </a>
        <div class="nav-hd" style="margin-top:6px">行业分类</div>
    </nav>
    <div class="nav-link-row">
        <a href="../" title="飞书版">📎 飞书版入口</a>
    </div>
    <div class="sb-foot">数据来源：夸克网盘 · GitHub Pages 托管</div>
</aside>

<!-- ==================== 主区 ==================== -->
<div class="main">
    <!-- 顶部 -->
    <div class="topbar">
        <h2 id="pageTitle">全部报告</h2>
        <span class="crumb" id="crumb"></span>
        <div class="search-wrap">
            <span class="sicon">🔍</span>
            <input type="text" id="searchInp" placeholder="搜索标题、摘要、标签...">
            <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
        </div>
        <label class="dedup-toggle" title="开启后隐藏重复报告">
            <input type="checkbox" id="dedupChk" checked onchange="onDedup()">
            <span class="dt-label">去重</span>
        </label>
        <button class="refresh-btn" id="refreshBtn" onclick="refreshData()" title="重新加载数据">
            <span class="rf-icon">🔄</span> 刷新
        </button>
    </div>

    <!-- 统计面板 -->
    <div class="stats-panel" id="statsPanel">
        <div class="stats-kpi">
            <div class="kpi-num" id="kpiTotal">-</div>
            <div class="kpi-label">报告总数</div>
            <div class="kpi-sub" id="kpiUpdate">最近同步：加载中...</div>
        </div>
        <div class="stats-dist" id="distPanel">
            <h4>🏷️ 行业分布 TOP 8</h4>
            <div id="distBars"></div>
        </div>
        <div class="stats-chart" id="trendPanel">
            <h4>📈 近期新增趋势（按年份）</h4>
            <div id="trendBars" class="trend-bars"></div>
        </div>
    </div>

    <!-- 内容 -->
    <div class="content">
        <div class="list-info">
            <span id="resultInfo">正在加载...</span>
            <select class="sort-select" id="sortSel" onchange="onSort()">
                <option value="score">按质量评分 ↓</option>
                <option value="date">按日期 ↓</option>
                <option value="title">按标题 A-Z</option>
            </select>
        </div>
        <div class="grid" id="grid"></div>
        <div class="pagination" id="pagination"></div>
        <div class="loading-box" id="loadingBox">
            <div class="spinner"></div>
            <div>正在加载报告...</div>
        </div>
        <div class="empty-box" id="emptyBox">
            <div class="e-icon">📭</div>
            <h3>未找到匹配的报告</h3>
            <p>请尝试调整搜索条件或切换行业分类</p>
        </div>
    </div>
</div>

<script>
// ==================== 配置 ====================
const PG = 20;
const CATS = ["小红书","抖音","TikTok","营销方案","品牌手册",
              "美妆个护","宠物经济","服饰时尚","食品饮料","母婴亲子",
              "家居生活","大健康","快消零售","奢侈品","香氛","户外运动",
              "跨境电商","其他"];

// ==================== 全局状态 ====================
let allData = [];         // 全部报告（已展开）
let allRemoved = [];      // 被去重的报告
let catIdx = null;        // 索引
let curCat = "";
let curPage = 1;
let curSearch = "";
let curSort = "score";
let curDedup = true;      // 默认开启去重

// ==================== 初始化 ====================
function init() {
    renderNav();
    loadIdx().then(() => {
        loadAll();
    });
}

async function loadIdx() {
    try {
        const r = await fetch("data/categories/_index.json?" + Date.now());
        if (r.ok) catIdx = await r.json();
        document.getElementById("kpiUpdate").textContent =
            "最近同步：" + (catIdx?.updated || "未知");
        updateSyncStatus(catIdx);
    } catch(e) { console.warn("索引加载失败"); }
}

function updateSyncStatus(idx) {
    const el = document.getElementById("sbSync");
    const txt = document.getElementById("sbSyncText");
    const dot = el?.querySelector(".ss-dot");
    if (!idx?.updated) {
        txt.textContent = "尚未同步";
        dot.className = "ss-dot err";
        el.className = "sb-sync outdated";
        return;
    }
    const lastSync = new Date(idx.updated);
    const now = new Date();
    const diffMin = (now - lastSync) / 60000;
    if (diffMin < 60) {
        dot.className = "ss-dot ok";
        txt.textContent = Math.round(diffMin) + " 分钟前同步";
        el.className = "sb-sync";
    } else if (diffMin < 1440) {
        dot.className = "ss-dot ok";
        txt.textContent = Math.round(diffMin / 60) + " 小时前同步";
        el.className = "sb-sync";
    } else {
        dot.className = "ss-dot old";
        txt.textContent = Math.round(diffMin / 1440) + " 天前同步";
        el.className = "sb-sync outdated";
    }
}

async function refreshData() {
    const btn = document.getElementById("refreshBtn");
    btn.classList.add("loading");
    btn.querySelector(".rf-icon").textContent = "⏳";
    btn.childNodes[1].textContent = " 刷新中...";

    try {
        await loadIdx();
        await loadAll();
        btn.classList.remove("loading");
        btn.querySelector(".rf-icon").textContent = "✅";
        btn.childNodes[1].textContent = " 已刷新";
        setTimeout(() => {
            btn.querySelector(".rf-icon").textContent = "🔄";
            btn.childNodes[1].textContent = " 刷新";
        }, 2000);
    } catch(e) {
        btn.classList.remove("loading");
        btn.querySelector(".rf-icon").textContent = "❌";
        btn.childNodes[1].textContent = " 失败重试";
        setTimeout(() => {
            btn.querySelector(".rf-icon").textContent = "🔄";
            btn.childNodes[1].textContent = " 刷新";
        }, 3000);
    }
}

async function loadAll() {
    document.getElementById("loadingBox").style.display = "block";
    document.getElementById("grid").innerHTML = "";
    document.getElementById("emptyBox").style.display = "none";

    let merged = [];
    let removedAll = [];
    for (const cat of CATS) {
        try {
            const r = await fetch(`data/categories/${cat}.json`);
            if (r.ok) {
                const d = await r.json();
                if (Array.isArray(d.files)) {
                    d.files.forEach(f => { f._cat = cat; merged.push(f); });
                }
                // 合并被去重的文件（标记 _dup=true）
                if (Array.isArray(d._removed)) {
                    d._removed.forEach(f => {
                        f._cat = cat; f._dup = true; removedAll.push(f);
                    });
                }
            }
        } catch(e) {}
    }

    allData = merged;
    allRemoved = removedAll;
    document.getElementById("loadingBox").style.display = "none";
    
    // 更新去重统计
    document.getElementById("sDups").textContent = removedAll.length;
    
    refreshAll();
}

function refreshAll() {
    renderNavCounts();
    renderStats();
    renderGrid();
}

// ==================== 导航 ====================
function renderNav() {
    const nav = document.querySelector(".sb-nav");
    CATS.forEach(cat => {
        const a = document.createElement("a");
        a.setAttribute("data-cat", cat);
        a.className = "cat-link";
        a.onclick = () => setCat(cat);
        const safe = cat.replace(/\s/g,"_");
        a.innerHTML = `📂 ${cat} <span class="cnt" id="c${safe}">-</span>`;
        nav.appendChild(a);
    });
}

function renderNavCounts() {
    const total = curDedup ? allData.length : (allData.length + allRemoved.length);
    document.getElementById("cAll").textContent = total;
    document.getElementById("sTotal").textContent = total;

    const catCounts = {};
    const source = curDedup ? allData : [...allData, ...allRemoved];
    source.forEach(r => { catCounts[r._cat] = (catCounts[r._cat] || 0) + 1; });
    CATS.forEach(cat => {
        const el = document.getElementById("c" + cat.replace(/\s/g,"_"));
        if (el) {
            const n = catCounts[cat] || 0;
            el.textContent = n;
            if (n === 0) el.classList.add("zero"); else el.classList.remove("zero");
        }
    });
}

function setCat(cat) {
    curCat = cat;
    curPage = 1;
    curSearch = "";
    document.getElementById("searchInp").value = "";
    document.getElementById("clearBtn").classList.remove("visible");

    document.querySelectorAll(".sb-nav a").forEach(a => {
        a.classList.toggle("active", a.getAttribute("data-cat") === cat);
    });

    document.getElementById("pageTitle").textContent = cat || "全部报告";
    document.getElementById("crumb").textContent = cat ? "行业报告 / " + cat : "";

    refreshAll();
}

// ==================== 统计面板 ====================
function renderStats() {
    const filtered = getFiltered();

    // KPI
    document.getElementById("kpiTotal").textContent = filtered.length;

    // 行业分布
    const catDist = {};
    filtered.forEach(r => { catDist[r._cat] = (catDist[r._cat] || 0) + 1; });
    const sorted = Object.entries(catDist).sort((a,b) => b[1] - a[1]).slice(0, 8);
    const maxV = sorted.length > 0 ? sorted[0][1] : 1;
    const colors = ["#4f46e5","#06b6d4","#10b981","#f59e0b","#ef4444","#8b5cf6","#ec4899","#14b8a6"];
    document.getElementById("distBars").innerHTML = sorted.map(([c,v],i) => `
        <div class="bar-row">
            <span class="bar-label">${c}</span>
            <span class="bar-track"><span class="bar-fill" style="width:${(v/maxV*100).toFixed(0)}%;background:${colors[i]}"></span></span>
            <span class="bar-val">${v}</span>
        </div>
    `).join("") || '<div style="font-size:12px;color:var(--text2)">暂无数据</div>';

    // 年份趋势
    const yrDist = {};
    filtered.forEach(r => {
        const yr = r.year || "未知";
        yrDist[yr] = (yrDist[yr] || 0) + 1;
    });
    const yrSorted = Object.entries(yrDist).sort((a,b) => a[0].localeCompare(b[0]));
    const yrMax = yrSorted.length > 0 ? Math.max(...yrSorted.map(([,v]) => v)) : 1;
    document.getElementById("trendBars").innerHTML = yrSorted.map(([yr, v]) => `
        <div class="trend-bar-item">
            <div class="tb-val">${v}</div>
            <div class="tb-bar" style="height:${Math.max(4,(v/yrMax*64)).toFixed(0)}px"></div>
            <div class="tb-label">${yr}</div>
        </div>
    `).join("") || '<div style="font-size:12px;color:var(--text2);padding-top:10px">暂无数据</div>';
}

// ==================== 过滤 & 排序 ====================
function getFiltered() {
    let result = curDedup ? [...allData] : [...allData, ...allRemoved];
    if (curCat) result = result.filter(r => r._cat === curCat);
    if (curSearch) {
        const q = curSearch.toLowerCase();
        result = result.filter(r =>
            (r.title || "").toLowerCase().includes(q) ||
            (r.summary || "").toLowerCase().includes(q) ||
            (r.tags || []).some(t => t.toLowerCase().includes(q))
        );
    }
    // 排序
    if (curSort === "score") result.sort((a,b) => (b.score||0) - (a.score||0));
    else if (curSort === "date") result.sort((a,b) => (b.year||"").localeCompare(a.year||""));
    else if (curSort === "title") result.sort((a,b) => (a.title||"").localeCompare(b.title||""));
    return result;
}

function onDedup() {
    curDedup = document.getElementById("dedupChk").checked;
    curPage = 1;
    renderStats();
    renderGrid();
}

function onSort() {
    curSort = document.getElementById("sortSel").value;
    curPage = 1;
    renderGrid();
}

// ==================== 渲染卡片 ====================
function fmtDate(d) {
    if (!d || d === "未知") return "";
    if (/^\d{4}-01-01$/.test(d)) return d.substring(0, 4) + "年";
    return d;
}

function scoreClass(s) {
    if (s >= 90) return "s90";
    if (s >= 80) return "s80";
    if (s >= 70) return "s70";
    if (s >= 60) return "s60";
    return "s50";
}

function esc(s) {
    if (!s) return "";
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
}

function formatSize(bytes) {
    if (!bytes || bytes === 0) return "";
    if (bytes < 1024) return bytes + " B";
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
    return (bytes / (1024 * 1024)).toFixed(1) + " MB";
}

function renderCard(r) {
    const url = r.url || "#";
    const sc = r.score || 50;
    const scls = scoreClass(sc);
    const catTag = r._cat ? `<span class="tag-cat">${esc(r._cat)}</span>` : "";
    const tags = (r.tags || []).slice(0, 4).map(t => `<span>${esc(t)}</span>`).join("");
    const date = fmtDate(r.date) || fmtDate(r.year);
    const dupCls = r._dup ? " dup-card" : "";
    const dupTag = r._dup ? `<span class="c-dup-tag">⚡ 重复</span>` : "";
    const sizeStr = formatSize(r.size);

    return `
    <div class="card${dupCls}">
        <span class="c-score ${scls}">${sc}</span>
        ${dupTag}
        <div class="c-title">${esc(r.title)}</div>
        <div class="c-summary">${esc(r.summary) || "暂无摘要"}</div>
        <div class="c-tags">${catTag}${tags}</div>
        <div class="c-footer">
            <span class="c-date">📅 ${date}${sizeStr ? ' · ' + sizeStr : ''}</span>
            <a class="c-link" href="${url}" target="_blank" rel="noopener">📥 夸克网盘 →</a>
        </div>
    </div>`;
}

function renderGrid() {
    const filtered = getFiltered();
    const total = filtered.length;
    const totalPages = Math.ceil(total / PG) || 1;
    const start = (curPage - 1) * PG;
    const paged = filtered.slice(start, start + PG);

    document.getElementById("grid").innerHTML =
        paged.length ? paged.map(renderCard).join("") : "";
    document.getElementById("emptyBox").style.display =
        paged.length ? "none" : "block";
    const dupInfo = (!curDedup && allRemoved.length) ? ` · 含 ${allRemoved.length} 篇重复` : "";
    document.getElementById("resultInfo").textContent =
        total ? `共 ${total} 篇报告${dupInfo}` : "暂无数据";

    // 分页
    const pag = document.getElementById("pagination");
    if (totalPages <= 1) { pag.innerHTML = ""; return; }
    let html = `<button onclick="go(${curPage-1})" ${curPage<=1?"disabled":""}>‹ 上一页</button>`;
    const s = Math.max(1, curPage - 2);
    const e = Math.min(totalPages, curPage + 2);
    for (let i = s; i <= e; i++) {
        html += `<button class="${i===curPage?'active':''}" onclick="go(${i})">${i}</button>`;
    }
    html += `<button onclick="go(${curPage+1})" ${curPage>=totalPages?"disabled":""}>下一页 ›</button>`;
    html += `<span class="pg-info">${curPage}/${totalPages} 页</span>`;
    pag.innerHTML = html;
}

function go(p) {
    const tp = Math.ceil(getFiltered().length / PG) || 1;
    if (p < 1 || p > tp) return;
    curPage = p;
    renderGrid();
    window.scrollTo({top: 160, behavior: "smooth"});
}

// ==================== 搜索 ====================
let searchTimer;
document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("searchInp").addEventListener("input", function() {
        const v = this.value.trim();
        document.getElementById("clearBtn").classList.toggle("visible", v.length > 0);
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            curSearch = v;
            curPage = 1;
            renderStats();
            renderGrid();
        }, 250);
    });
    init();
});

function clearSearch() {
    document.getElementById("searchInp").value = "";
    document.getElementById("clearBtn").classList.remove("visible");
    curSearch = "";
    curPage = 1;
    refreshAll();
}
</script>
</body>
</html>
